<h6>Follow me</h6>

<ul class="social-media">

  {% if site.social.github %}
    <li>
      <a title="{{ site.social.github }} on Github" href="https://github.com/Namle-A6{{ site.social.github }}" target="_blank"><i class="fab fa-github fa-2x"></i></a>
    </li>
  {% endif %}

  {% if site.social.stackoverflow %}
    <li>
      <a title="{{ site.social.stackoverflow }} on StackOverflow" href="https://stackoverflow.com/users/32608980/namnl{{ site.social.stackoverflow }}" target="_blank"><i class="fab fa-stack-overflow fa-2x"></i></a>
    </li>
  {% endif %}

{% if site.social.facebook %}
  <li>
    <a title="{{ site.social.facebook }} on Facebook" href="https://www.facebook.com/namlete99/{{ site.social.facebook }}" target="_blank"><i class="fab fa-facebook fa-2x"></i></a>
  </li>
{% endif %}

  {% if site.social.instagram %}
    <li>
      <a title="{{ site.social.instagram }} on Instagram" href="https://www.instagram.com/namlete.99/{{ site.social.instagram }}" target="_blank"><i class="fab fa-instagram fa-2x"></i></a>
    </li>
  {% endif %}

  {% if site.social.rss %}
    <li>
      <a title="{{ site.social.rss }} RSS" href="{{ site.social.rss | relative_url }}" target="_blank"><i class="fas fa-rss fa-2x"></i></a>
    </li>
  {% endif %}

</ul>
